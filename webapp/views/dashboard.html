<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — WhatsWebsite</title>
  <link rel="icon" href="/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --primary: #22c55e; --primary-glow: rgba(34,197,94,0.15);
      --text: #f5f5f5; --text2: #a1a1aa; --border: #2a2a2a;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100dvh;
    }
    .nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .nav-brand { font-size: 18px; font-weight: 800; color: var(--primary); }
    .nav-actions { display: flex; gap: 12px; align-items: center; }
    .nav-actions a {
      color: var(--text2); text-decoration: none; font-size: 14px;
      padding: 8px 16px; border-radius: 8px; transition: all 0.2s;
    }
    .nav-actions a:hover { color: var(--text); background: var(--surface2); }

    .page { max-width: 800px; margin: 0 auto; padding: 24px 20px; }

    .welcome {
      margin-bottom: 32px;
    }
    .welcome h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .welcome p { color: var(--text2); font-size: 14px; }

    .create-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 20px; border: 2px dashed var(--primary);
      border-radius: 16px; background: var(--primary-glow);
      color: var(--primary); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      margin-bottom: 32px;
    }
    .create-btn:hover { background: rgba(34,197,94,0.2); transform: translateY(-1px); }

    .sites-header { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 16px; }

    .sites-grid { display: grid; gap: 16px; }

    .site-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; transition: all 0.2s;
      cursor: pointer; text-decoration: none; color: inherit;
      display: block;
    }
    .site-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

    .site-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .site-name { font-size: 18px; font-weight: 700; }
    .site-badge {
      padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
    .badge-free { background: rgba(34,197,94,0.1); color: #22c55e; }
    .badge-premium { background: rgba(234,179,8,0.1); color: #eab308; }

    .site-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .site-meta-item { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 4px; }

    .site-actions { display: flex; gap: 8px; margin-top: 16px; }
    .site-actions a {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .act-edit { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .act-edit:hover { border-color: var(--primary); color: var(--primary); }
    .act-view { background: var(--primary); color: white; }
    .act-view:hover { opacity: 0.9; }

    .empty-state {
      text-align: center; padding: 60px 20px;
    }
    .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 20px; margin-bottom: 8px; }
    .empty-state p { color: var(--text2); font-size: 14px; line-height: 1.6; }

    .loading { text-align: center; padding: 40px; color: var(--text2); }
  </style>
</head>
<body>
  <nav class="nav">
    <span class="nav-brand">🌐 WhatsWebsite</span>
    <div class="nav-actions">
      <a href="/logout">Logout</a>
    </div>
  </nav>

  <div class="page">
    <div class="welcome">
      <h1>Namaste! 🙏</h1>
      <p>Apni websites manage karo ya nayi banao</p>
    </div>

    <a class="create-btn" href="/create">
      <span style="font-size:24px">+</span> Nayi Website Banao
    </a>

    <div id="sites-container">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    async function loadSites() {
      try {
        const res = await fetch('/api/my-sites');
        if (res.status === 401) return window.location.href = '/login';
        const { sites } = await res.json();

        const container = document.getElementById('sites-container');

        if (!sites.length) {
          container.innerHTML = `
            <div class="empty-state">
              <div class="emoji">🏗️</div>
              <h2>Abhi koi website nahi hai</h2>
              <p>"Nayi Website Banao" pe click karo<br>2 minute mein live ho jayegi!</p>
            </div>`;
          return;
        }

        container.innerHTML = `
          <div class="sites-header">Aapki Websites (${sites.length})</div>
          <div class="sites-grid">
            ${sites.map(s => `
              <div class="site-card">
                <div class="site-card-header">
                  <span class="site-name">${s.business_name}</span>
                  <span class="site-badge ${s.plan === 'premium' ? 'badge-premium' : 'badge-free'}">
                    ${s.plan === 'premium' ? '⭐ Premium' : '🆓 Free'}
                  </span>
                </div>
                <div class="site-meta">
                  <span class="site-meta-item">📁 ${s.category}</span>
                  <span class="site-meta-item">📅 ${new Date(s.created_at).toLocaleDateString('hi-IN')}</span>
                  ${s.custom_domain ? `<span class="site-meta-item">🌐 ${s.custom_domain}</span>` : ''}
                </div>
                <div class="site-actions">
                  <a href="/edit/${s.slug}" class="act-edit">✏️ Edit</a>
                  <a href="/site/${s.slug}" target="_blank" class="act-view">👁️ View Live</a>
                </div>
              </div>
            `).join('')}
          </div>`;
      } catch (e) {
        document.getElementById('sites-container').innerHTML = '<div class="loading">Error loading sites</div>';
      }
    }

    loadSites();
  </script>
</body>
</html>
